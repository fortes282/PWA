events {
  worker_connections 1024;
}

http {
  # ── MIME types ──────────────────────────────────────────────────────────────
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # ── Logging ─────────────────────────────────────────────────────────────────
  access_log /var/log/nginx/access.log;
  error_log  /var/log/nginx/error.log warn;

  # ── Performance ─────────────────────────────────────────────────────────────
  sendfile        on;
  tcp_nopush      on;
  keepalive_timeout 65;
  client_max_body_size 20M;

  # ── GZIP ────────────────────────────────────────────────────────────────────
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types text/plain text/css application/json application/javascript
             text/xml application/xml text/javascript application/wasm;

  # ── Upstreams ────────────────────────────────────────────────────────────────
  upstream web {
    server web:3000;
    keepalive 8;
  }

  upstream api {
    server api:3001;
    keepalive 8;
  }

  # ── HTTP server ───────────────────────────────────────────────────────────────
  server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=()" always;

    # API proxy (/api/* → api:3001/*)
    location /api/ {
      rewrite ^/api/(.*)$ /$1 break;
      proxy_pass http://api;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Connection "";
      # Pass cookies through (for httpOnly refresh token)
      proxy_pass_header Set-Cookie;
      proxy_cookie_path / /;
    }

    # Static assets — long cache
    location ~* \.(ico|css|js|gif|jpg|jpeg|png|svg|woff|woff2|ttf|eot|webp|avif)$ {
      proxy_pass http://web;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_cache_valid 200 30d;
      add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # Next.js app (everything else)
    location / {
      proxy_pass http://web;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_read_timeout 60s;
    }
  }

  # ── HTTPS server (uncomment and configure SSL certificate paths) ────────────
  # server {
  #   listen 443 ssl http2;
  #   server_name your-domain.com;
  #
  #   ssl_certificate     /etc/nginx/ssl/fullchain.pem;
  #   ssl_certificate_key /etc/nginx/ssl/privkey.pem;
  #   ssl_protocols TLSv1.2 TLSv1.3;
  #   ssl_ciphers HIGH:!aNULL:!MD5;
  #   ssl_session_cache shared:SSL:10m;
  #   ssl_session_timeout 10m;
  #
  #   add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  #
  #   # Same locations as HTTP server above
  #   location /api/ { ... }
  #   location / { ... }
  # }
}
